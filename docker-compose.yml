services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-simpa}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASS:?Set PG_PASS in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema_full.sql:/docker-entrypoint-initdb.d/01-schema_full.sql:ro
      - ./migration_002_auth.sql:/docker-entrypoint-initdb.d/02-migration_002_auth.sql:ro
      - ./migration_003_cadastros_fase2.sql:/docker-entrypoint-initdb.d/03-migration_003_cadastros_fase2.sql:ro
      - ./migration_004_cadastros_sync.sql:/docker-entrypoint-initdb.d/04-migration_004_cadastros_sync.sql:ro
      - ./migration_005_estabelecimentos_perfil_enrichment.sql:/docker-entrypoint-initdb.d/05-migration_005_estabelecimentos_perfil_enrichment.sql:ro
      - ./migration_006_import_depara.sql:/docker-entrypoint-initdb.d/06-migration_006_import_depara.sql:ro
      - ./migration_007_atendimento_domiciliar.sql:/docker-entrypoint-initdb.d/07-migration_007_atendimento_domiciliar.sql:ro
      - ./migration_008_painel_widgets.sql:/docker-entrypoint-initdb.d/08-migration_008_painel_widgets.sql:ro
      - ./migration_009_cadastros_forma_cbo.sql:/docker-entrypoint-initdb.d/09-migration_009_cadastros_forma_cbo.sql:ro
      - ./migration_010_sia_producao_cnes.sql:/docker-entrypoint-initdb.d/10-migration_010_sia_producao_cnes.sql:ro
      - ./migration_011_rubricas_sia.sql:/docker-entrypoint-initdb.d/11-migration_011_rubricas_sia.sql:ro
      - ./migration_012_populacao_cadastrada.sql:/docker-entrypoint-initdb.d/12-migration_012_populacao_cadastrada.sql:ro
      - ./migration_013_sih_tabelas.sql:/docker-entrypoint-initdb.d/13-migration_013_sih_tabelas.sql:ro
      - ./migration_014_sia_painel_indicadores.sql:/docker-entrypoint-initdb.d/14-migration_014_sia_painel_indicadores.sql:ro
      - ./migration_015_apac_metas_oci_par.sql:/docker-entrypoint-initdb.d/15-migration_015_apac_metas_oci_par.sql:ro
      - ./migration_016_fix_painel_widgets_utf8.sql:/docker-entrypoint-initdb.d/16-migration_016_fix_painel_widgets_utf8.sql:ro
      - ./migration_017_estabelecimentos_nome_utf8.sql:/docker-entrypoint-initdb.d/17-migration_017_estabelecimentos_nome_utf8.sql:ro
      - ./migration_018_estabelecimentos_status_editado.sql:/docker-entrypoint-initdb.d/18-migration_018_estabelecimentos_status_editado.sql:ro
      - ./migration_019_widget_sql_override.sql:/docker-entrypoint-initdb.d/19-migration_019_widget_sql_override.sql:ro
      - ./migration_020_sih_aih.sql:/docker-entrypoint-initdb.d/20-migration_020_sih_aih.sql:ro
      - ./migration_021_fix_painel_metricas_utf8.sql:/docker-entrypoint-initdb.d/21-migration_021_fix_painel_metricas_utf8.sql:ro
      - ./migration_022_procedimentos_esus_sigtap.sql:/docker-entrypoint-initdb.d/22-migration_022_procedimentos_esus_sigtap.sql:ro
      - ./migration_023_sih_aih_campos.sql:/docker-entrypoint-initdb.d/23-migration_023_sih_aih_campos.sql:ro
      - ./migration_024_sih_aih_widgets.sql:/docker-entrypoint-initdb.d/24-migration_024_sih_aih_widgets.sql:ro
      - ./migration_025_sih_proc_qtd_linhas.sql:/docker-entrypoint-initdb.d/25-migration_025_sih_proc_qtd_linhas.sql:ro
      - ./migration_026_leitos_vigencia.sql:/docker-entrypoint-initdb.d/26-migration_026_leitos_vigencia.sql:ro
      - ./migration_027_fix_sih_metricas_utf8.sql:/docker-entrypoint-initdb.d/27-migration_027_fix_sih_metricas_utf8.sql:ro
    ports:
      - '${PG_PUBLISH_PORT:-5433}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_USER:-postgres} -d ${PG_DB:-simpa}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - simpa-net

  api:
    image: simpa-api:${SIMPA_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      NODE_ENV: production
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - uploads:/app/uploads
      - ./parse_esus_csv.py:/app/parse_esus_csv.py:ro
      - ./consolidate_dashboard.py:/app/consolidate_dashboard.py:ro
      - ./sync_sia_mysql.py:/app/sync_sia_mysql.py:ro
      - ./sync_cadastros_mysql.py:/app/sync_cadastros_mysql.py:ro
      - ./etl_contract.py:/app/etl_contract.py:ro
      - ./etl_db.py:/app/etl_db.py:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - simpa-net

  web:
    image: simpa-web:${SIMPA_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-80}:80'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - simpa-net

volumes:
  pgdata:
  uploads:

networks:
  simpa-net:
    driver: bridge
