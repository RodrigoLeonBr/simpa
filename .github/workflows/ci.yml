name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI environment
        run: |
          cp .env.docker.example .env.docker
          sed -i 's/change_me_in_production/ci_pg_pass_2026/' .env.docker
          sed -i 's/change_me_use_random_string_at_least_32_chars/test-secret-with-at-least-32-characters-for-ci/' .env.docker

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            simpa-backend/package-lock.json
            simpa-frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest jsonschema

      - name: Install JavaScript dependencies
        run: npm run install:all

      - name: Start Docker test stack
        run: docker compose --env-file .env.docker -f docker-compose.yml -f docker-compose.test.yml up -d --build --wait
        env:
          PG_PASS: ci_pg_pass_2026
          JWT_SECRET: test-secret-with-at-least-32-characters-for-ci
          WEB_PORT: 8080
          PG_PUBLISH_PORT: 5433

      - name: Seed admin user
        run: docker compose --env-file .env.docker exec -T api node scripts/seed-admin.js

      - name: Python unit tests
        run: pytest -m "not integration"

      - name: Python integration tests
        run: pytest -m integration
        env:
          PG_HOST: 127.0.0.1
          PG_PORT: 5433
          PG_PASS: ci_pg_pass_2026
          PG_DB: simpa
          PG_USER: postgres

      - name: Backend Jest
        run: npm test --prefix simpa-backend

      - name: Frontend Vitest
        run: npm test --prefix simpa-frontend

      - name: Install Playwright browsers
        working-directory: simpa-frontend
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        working-directory: simpa-frontend
        run: npm run test:e2e
        env:
          E2E_BASE_URL: http://localhost:8080
          E2E_ADMIN_USER: admin
          E2E_ADMIN_PASS: simpa@2026

      - name: Stop Docker stack
        if: always()
        run: docker compose --env-file .env.docker -f docker-compose.yml -f docker-compose.test.yml down -v
