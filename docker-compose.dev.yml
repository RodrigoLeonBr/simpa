# Development overrides — use: docker compose --env-file .env.docker -f docker-compose.yml -f docker-compose.dev.yml up
# Web stays published on WEB_PORT (default 8080), matching the Docker default on machines with Apache/XAMPP on :80.
# Para hot-reload do frontend, use na raiz: npm run dev:api + npm run dev:web (Vite :5173).
services:
  postgres:
    ports:
      - '${PG_PUBLISH_PORT:-5433}:5432'

  api:
    ports:
      - '${PORT:-3001}:3001'
    environment:
      NODE_ENV: development
    volumes:
      - ./simpa-backend/src:/app/simpa-backend/src:ro

  web:
    ports:
      - '${WEB_PORT:-8080}:80'
